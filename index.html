<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Ejaari - عقارات</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body data-lang="ar">

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-left">
      <h1 class="logo">EJAARI</h1>
    </div>
    <div class="header-right">
      <div id="header-actions" style="display:flex;align-items:center;gap:8px">
        <button id="notif-btn" onclick="openNotifications()" title="الإشعارات" style="position:relative">
          🔔
          <span id="notif-badge" style="display:none;position:absolute;top:-6px;right:-6px;background:#e53935;color:#fff;border-radius:50%;padding:2px 6px;font-size:12px"></span>
        </button>
        <div id="user-section" style="display:none;align-items:center;gap:8px">
          <div id="user-avatar" class="avatar"></div>
          <div id="user-name" class="user-name"></div>
          <div id="profile-menu" style="display:none"></div>
        </div>
        <button id="login-btn" onclick="navigate('auth')">تسجيل</button>
      </div>
    </div>
  </header>

  <!-- NAV -->
  <nav class="main-nav">
    <a id="nav-home" class="nav-link active" onclick="navigate('home')">الرئيسية</a>
    <a id="nav-listings" class="nav-link" onclick="navigate('listings')">العقارات</a>
    <a id="nav-map" class="nav-link" onclick="navigate('map')">الخريطة</a>
    <a id="nav-dashboard" class="nav-link" onclick="navigate('dashboard')">لوحة التحكم</a>
    <button class="btn-primary" onclick="openAddProp()">أضف عقار</button>
  </nav>

  <!-- PAGES -->
  <main>
    <!-- HOME -->
    <section id="page-home" class="page active">
      <h2>عقارات مميزة</h2>
      <div id="featured-grid" class="grid"></div>
    </section>

    <!-- LISTINGS -->
    <section id="page-listings" class="page">
      <h2>العقارات</h2>
      <div class="filters">
        <input id="f-location" placeholder="بحث بالموقع أو العنوان" oninput="applyFilters()">
        <input id="f-min" placeholder="سعر أدنى" type="number" oninput="applyFilters()">
        <input id="f-max" placeholder="سعر أقصى" type="number" oninput="applyFilters()">
        <select id="f-rooms" onchange="applyFilters()">
          <option value="">كل الغرف</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4+</option>
        </select>
        <select id="f-sort" onchange="applyFilters()">
          <option value="">الأحدث</option>
          <option value="price-asc">السعر تصاعدي</option>
          <option value="price-desc">السعر تنازلي</option>
        </select>
      </div>
      <div id="listings-grid" class="grid listings-grid"></div>
    </section>

    <!-- MAP -->
    <section id="page-map" class="page">
      <h2>الخريطة</h2>
      <div id="map" style="height:400px"></div>
    </section>

    <!-- DASHBOARD -->
    <section id="page-dashboard" class="page">
      <h2>لوحة التحكم</h2>
      <div id="dash-welcome"></div>
      <div id="dash-props-list"></div>
      <div class="dashboard-stats">
        <div>إجمالي العقارات: <span id="stat-props">0</span></div>
        <div>نشط: <span id="stat-active">0</span></div>
        <div>رسائل: <span id="stat-messages">0</span></div>
        <div>إيرادات: <span id="stat-revenue">0</span></div>
      </div>
    </section>

    <!-- AUTH -->
    <section id="page-auth" class="page">
      <h2>تسجيل / دخول</h2>
      <div class="auth">
        <div id="auth-login">
          <input id="login-email" placeholder="البريد الإلكتروني">
          <input id="login-password" placeholder="كلمة المرور" type="password">
          <button onclick="handleLogin()">دخول</button>
        </div>
        <div id="auth-register" style="display:none">
          <input id="register-name" placeholder="الاسم">
          <input id="register-email" placeholder="البريد الإلكتروني">
          <select id="register-type">
            <option value="landlord">مالك</option>
            <option value="tenant">مستأجر</option>
          </select>
          <input id="register-phone" placeholder="الهاتف">
          <input id="register-password" placeholder="كلمة المرور" type="password">
          <button onclick="handleRegister()">إنشاء حساب</button>
        </div>
        <div style="margin-top:8px">
          <button class="auth-tab active" onclick="authTab('login', this)">دخول</button>
          <button class="auth-tab" onclick="authTab('register', this)">تسجيل</button>
        </div>
      </div>
    </section>
  </main>

  <!-- ADD PROPERTY MODAL -->
  <div id="add-prop-modal" class="modal" style="display:none">
    <div class="modal-inner">
      <button class="modal-close" onclick="closeModal('add-prop-modal')">✕</button>
      <h3>أضف عقار</h3>
      <input id="new-title" placeholder="عنوان العقار">
      <select id="new-type">
        <option value="شقة">شقة</option>
        <option value="فيلا">فيلا</option>
        <option value="مكتب">مكتب</option>
        <option value="محل">محل</option>
      </select>
      <input id="new-location" placeholder="الموقع">
      <input id="new-price" placeholder="السعر" type="number">
      <input id="new-rooms" placeholder="عدد الغرف" type="number">
      <input id="new-baths" placeholder="عدد الحمامات" type="number">
      <input id="new-area" placeholder="المساحة (م²)" type="number">
      <input id="new-phone" placeholder="هاتف المؤجر">
      <textarea id="new-desc" placeholder="وصف العقار"></textarea>

      <label>صور / فيديو</label>
      <input id="new-media" type="file" accept="image/*,video/*" multiple onchange="handleMediaUpload(event)">
      <div id="media-preview" class="media-preview"></div>

      <label>تحديد الموقع على الخريطة</label>
      <div id="add-prop-map" style="height:220px"></div>
      <input id="new-map-lat" placeholder="خط العرض">
      <input id="new-map-lng" placeholder="خط الطول">

      <div style="margin-top:8px">
        <button onclick="addProperty()" class="btn-primary">نشر العقار</button>
        <button onclick="closeModal('add-prop-modal')" class="btn-outline">إلغاء</button>
      </div>
    </div>
  </div>

  <!-- DETAIL modal -->
  <div id="detail-modal" class="modal" style="display:none">
    <div class="modal-inner">
      <button class="modal-close" onclick="closeModal('detail-modal')">✕</button>
      <div id="detail-content"></div>
    </div>
  </div>

  <!-- CHAT modal -->
  <div id="chat-modal" class="modal" style="display:none">
    <div class="modal-inner chat-modal-inner">
      <button class="modal-close" onclick="closeModal('chat-modal')">✕</button>
      <div class="chat-header">
        <div>
          <div id="chat-prop-title" style="font-weight:700"></div>
          <div id="chat-prop-owner" style="font-size:12px;color:var(--text2)"></div>
        </div>
      </div>
      <div id="chat-messages" class="chat-messages" style="padding:12px;max-height:320px;overflow:auto;background:#fff;border-radius:8px;margin:8px 0"></div>
      <div class="chat-input-row" style="display:flex;gap:8px">
        <input id="chat-input" type="text" placeholder="اكتب رسالة..." style="flex:1;padding:8px;border-radius:6px;border:1px solid #ddd">
        <button id="chat-send-btn" class="btn-primary">إرسال</button>
      </div>
    </div>
  </div>

  <!-- NOTIFICATIONS modal -->
  <div id="notif-modal" class="modal" style="display:none">
    <div class="modal-inner">
      <button class="modal-close" onclick="closeModal('notif-modal')">✕</button>
      <h3>الإشعارات</h3>
      <div id="notif-list" style="max-height:400px;overflow:auto"></div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast" style="display:block"></div>

  <!-- FOOTER / STATS -->
  <footer>
    <div>إجمالي العقارات: <span id="stats-props">0</span></div>
    <div>المستخدمين: <span id="stats-users">0</span></div>
  </footer>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- App JS -->
  <script src="app.js"></script>
</body>
</html>
